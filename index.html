<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernovas | Rexon Premium Mod Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Space+Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .supernova-bg { 
            background: radial-gradient(circle at top right, #4c1d95 0%, #050505 60%); 
            background-attachment: fixed;
        }

        .glass { 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
        }

        .btn-nova { 
            background: linear-gradient(135deg, #9415ca 0%, #d946ef 100%); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .btn-rexon { 
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); 
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            cursor: pointer;
        }

        .btn-rexon:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
        }

        .glow-text-gold { text-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }

        #sale-popup {
            position: fixed;
            bottom: 20px;
            left: -300px;
            transition: left 0.5s ease-in-out;
            z-index: 1000;
        }
    </style>
</head>
<body class="supernova-bg min-h-screen">

    <div id="sale-popup" class="glass p-4 rounded-2xl border-fuchsia-500/50 flex items-center space-x-4">
        <div class="w-10 h-10 bg-fuchsia-600 rounded-full flex items-center justify-center text-xl">🔥</div>
        <div>
            <p class="text-[10px] font-bold text-fuchsia-400 uppercase tracking-widest text-white">Recent Activity</p>
            <p id="popup-text" class="text-xs font-bold text-white">Someone just bought Rexon Premium</p>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-fuchsia-500 rounded-full flex items-center justify-center">
                <span class="text-white font-black text-xl italic">S</span>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-widest uppercase leading-none text-white">Supernovas</h1>
                <p class="text-[8px] text-fuchsia-400 font-bold tracking-[0.3em] uppercase">Marketplace</p>
            </div>
        </div>
        <div class="flex space-x-6 text-[10px] font-bold tracking-widest uppercase text-white">
            <a href="#menus" class="text-amber-400 hover:text-amber-200 transition">Mod Menus</a>
            <a href="#tools" class="text-slate-300 hover:text-white transition">Tools</a>
            <a href="https://discord.gg/wWyuresw" target="_blank" class="text-slate-300 hover:text-white transition">Discord</a>
        </div>
    </nav>

    <header class="py-16 px-6 text-center max-w-4xl mx-auto">
        <h2 class="text-5xl font-black mb-4 tracking-tighter text-white uppercase italic">Elite Unity Assets</h2>
        <div class="glass px-4 py-1 rounded-full border-green-500/30 inline-block">
            <span class="text-green-400 font-bold text-[10px]">● LIVE SALES: <span id="sales-count">1</span></span>
        </div>
    </header>

    <section id="menus" class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-10 rounded-[3rem] border-amber-500/40 relative overflow-hidden group shadow-2xl shadow-amber-900/10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="bg-amber-500 text-black text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Top Seller</span>
                        <h4 class="text-4xl font-black tracking-tighter text-white mt-4 glow-text-gold">REXON <span class="text-amber-500">PREMIUM</span></h4>
                    </div>
                    <p class="text-3xl font-black text-white leading-none">$12.99</p>
                </div>
                <a href="https://ko-fi.com/s/f5f3f840e8" onclick="handlePurchase('Rexon Premium', 12.99)" target="_blank" class="btn-rexon w-full block text-center py-5 rounded-2xl text-black font-black text-xs uppercase tracking-[0.2em]">
                    PURCHASE REXON LICENSE
                </a>
            </div>
        </div>
    </section>

    <section id="tools" class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col h-full border-fuchsia-500/20">
                <h4 class="text-lg font-black uppercase text-fuchsia-400 mb-2">Anti-Remover</h4>
                <div class="flex justify-between items-center pt-6 border-t border-white/5">
                    <span class="text-2xl font-black text-white">$1.99</span>
                    <a href="https://ko-fi.com/s/06218841a8" onclick="handlePurchase('Anti-Remover', 1.99)" target="_blank" class="btn-nova px-6 py-3 rounded-xl text-[10px] font-black uppercase text-white">BUY</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1498477931918266378/JFPscmCY_Nwb8YaMLvrHdC1A0Xj7FEZbNcGXUI5lZrRSscncFLv1hkwwuNWpj5KLqy7c";

        let count = localStorage.getItem('totalSales') || 1;
        document.getElementById('sales-count').innerText = count;

        function handlePurchase(itemName, price) {
            // 1. Update Local UI
            count++;
            localStorage.setItem('totalSales', count);
            document.getElementById('sales-count').innerText = count;

            // 2. Send Discord Webhook
            const data = {
                username: "Supernova Marketplace Alerts",
                avatar_url: "https://i.imgur.com/4M34hi2.png",
                embeds: [{
                    title: "🛒 New Checkout Started!",
                    description: `A customer has clicked the buy button for **${itemName}**.`,
                    color: itemName.includes('Rexon') ? 16751104 : 14422250, // Gold for Rexon, Purple for Tools
                    fields: [
                        { name: "Item", value: itemName, inline: true },
                        { name: "Price", value: `$${price}`, inline: true }
                    ],
                    footer: { text: "Supernova Sales Tracker • 2026" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        // Fake Sale Popups for UI
        const popup = document.getElementById('sale-popup');
        const popupText = document.getElementById('popup-text');
        function showFakeSale() {
            popupText.innerText = `Someone just bought a Supernova Asset!`;
            popup.style.left = "20px";
            setTimeout(() => { popup.style.left = "-400px"; }, 5000);
        }
        setInterval(showFakeSale, 80000);
    </script>
</body>
</html>
